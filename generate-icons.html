<!DOCTYPE html>
<html><head><title>Icon Generator</title></head>
<body>
<p>Rechtsklick auf die Bilder -> "Bild speichern unter" als icon-192.png und icon-512.png</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Ring
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = s * 0.06;
  ctx.beginPath();
  ctx.arc(s/2, s*0.42, s*0.22, -Math.PI*0.8, Math.PI*0.6);
  ctx.stroke();
  // Triangle (play-like)
  ctx.fillStyle = '#4ecca3';
  const tx = s*0.42, ty = s*0.32, ts = s*0.2;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx + ts, ty + ts*0.58);
  ctx.lineTo(tx, ty + ts*1.15);
  ctx.closePath();
  ctx.fill();
  // Text
  ctx.fillStyle = '#eee';
  ctx.font = `bold ${s*0.14}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('OdyC', s/2, s*0.82);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body></html>
